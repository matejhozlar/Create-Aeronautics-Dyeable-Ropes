name: Build

on:
  pull_request:
    branches:
      - 1.21.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Simulated jar
        run: |
          git clone --depth 1 https://github.com/Creators-of-Aeronautics/Simulated-Project.git ../Simulated-Project
          chmod +x ../Simulated-Project/gradlew
          (cd ../Simulated-Project && ./gradlew :simulated:neoforge:jar --no-daemon)

      - name: Generate derived assets
        run: |
          pip install --quiet Pillow
          python scripts/recolor_ropes.py
          python scripts/generate_jsons.py

      - name: Build with Gradle
        run: ./gradlew build
