modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="saunhardy"
displayURL="https://gitea.matejhoz.com/matejhozlar/dyeable-ropes"
issueTrackerURL="https://gitea.matejhoz.com/matejhozlar/dyeable-ropes/issues"
description='''
Addon for Create: Aeronautics (Simulated module). Adds 16 dye-colored rope items, one per vanilla dye color, crafted by combining a Simulated rope with a dye in any crafting grid. Phase 1: items, recipes, and inventory icons only. The placed strand still uses Simulated's default appearance until a future update wires per-strand color into the renderer.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="simulated"
    type="required"
    versionRange="[${simulated_mod_version},)"
    ordering="AFTER"
    side="BOTH"
    reason="Recipes consume simulated:rope_coupling."
