modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="saunhardy"
displayURL="https://gitea.matejhoz.com/matejhozlar/create-aeronautics-dyeable-ropes"
issueTrackerURL="https://gitea.matejhoz.com/matejhozlar/create-aeronautics-dyeable-ropes/issues"
description='''
Addon for Create: Aeronautics (Simulated module). Adds dye-colored rope coupling variants: 16 vanilla colors, plus 16 more when Dye Depot is installed. Craft them by combining a Simulated rope coupling with a dye in any crafting grid, or dye a placed strand in-world by holding a dye and right-clicking it. Colors persist on placed strands and render in-world, and breaking a colored strand returns the matching colored rope coupling.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="simulated"
    type="required"
    versionRange="[${simulated_mod_version},)"
    ordering="AFTER"
    side="BOTH"
    reason="Recipes consume simulated:rope_coupling."

[[dependencies.${mod_id}]]
    modId="sable"
    type="required"
    versionRange="[${sable_mod_version},)"
    ordering="AFTER"
    side="BOTH"
    reason="Transitive dependency of Simulated's rope strand system."

[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[${create_mod_version},)"
    ordering="AFTER"
    side="BOTH"
    reason="Uses Create's RaycastHelper and CreatePonderPlugin utilities."

[[dependencies.${mod_id}]]
    modId="dye_depot"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
    reason="Adds 16 extra dye colors beyond the 16 vanilla ones."

[[mixins]]
config="dyeable_ropes.mixins.json"
